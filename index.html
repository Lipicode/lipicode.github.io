<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chati - Chatbox</title>
</head>
<body>
    <h1>Welcome to Chati!</h1>
    <p><a href="textbox.html">Go to Chat</a></p>
    <button onclick="openFullscreenWindow()">ABOUT:BLANK</button>

    <center>
        <button onclick="openGame()" style="background-color: #1D3E60; color: #fff; border: 1; border-color: #1D3E60; vertical-align: center; font-size: 26px; width:100%; cursor: pointer; border-radius: 10px;"> Play in Fullscreen </button>
        <script>
            function openGame() {
                var win = window.open()
                var url = "lipicode.github.io"
                var iframe = win.document.createElement('iframe')
                iframe.style.width = "100%"
                iframe.style.height = "100%"
                iframe.style.border = "none"
                iframe.src = url
                win.document.body.appendChild(iframe)
            }

            function openFullscreenWindow() {
                var newWindow = window.open('about:blank', '_blank');
                newWindow.document.write('<h1>ABOUT:BLANK Window</h1>');
            }
        </script>
    </center>
</body>
</html>
